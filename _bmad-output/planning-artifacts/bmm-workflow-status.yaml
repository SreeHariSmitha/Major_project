# ═══════════════════════════════════════════════════════════════════════════════
# MCP TOOLS & DEVELOPMENT GUIDELINES (CRITICAL)
# ═══════════════════════════════════════════════════════════════════════════════
mcp_tools:
  shadcn_mcp:
    purpose: "UI Component Design"
    usage: "Use for all Shadcn UI component implementation and styling"
    when: "When building any UI components"

  chrome_mcp:
    purpose: "Application Testing in Browser"
    usage: "Test application end-to-end in browser after each feature"
    when: "After completing ANY feature - no shortcuts"
    critical_rules:
      - "Test every feature at application level"
      - "No shortcuts - everything must work end-to-end"
      - "When success message shown, VERIFY in database"

  context7_mcp:
    purpose: "Latest Documentation"
    usage: "Query for latest docs before writing any code"
    when: "Before implementing any feature - get best practices"

  mongo_mcp:
    purpose: "Database Operations & Verification"
    usage: "View/update MongoDB structure, verify data persistence"
    when: "After any DB operation to confirm data reflected correctly"

development_rules:
  testing:
    - "Test EVERY feature with Chrome MCP at application level"
    - "No shortcuts - full end-to-end verification"
    - "After success notification, check DB reflection via Mongo MCP"

  ui:
    - "Use Toast notifications for all user feedback"
    - "Use Shadcn UI components via Shadcn MCP"

  code_quality:
    - "Use Context7 MCP for latest documentation before coding"
    - "No legacy versions - always latest stable"
    - "No hardcoding - everything configurable"
    - "Production-grade from the start"
